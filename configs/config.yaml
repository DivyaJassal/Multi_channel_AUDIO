# --- data ---
sample_rate: 16000
segment_seconds: 3
max_sources: 4
data_root: "../conversational_dataset_v2"

# --- dataloader ---
train_batch_size: 8
val_batch_size: 8
num_workers: 4
shuffle: true

# --- model ---
enc_filters: 256
enc_kernel_size: 32
bottleneck_channels: 128
hidden_channels: 256
tcn_kernel_size: 3
num_blocks: 6
num_repeats: 2

# --- training ---
epochs: 17
lr: 0.001
grad_clip_norm: 5.0
silence_weight: 0.1

checkpoint_dir: "../checkpoints"

seed: 0